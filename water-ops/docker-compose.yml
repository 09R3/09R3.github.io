services:
  water-ops:
    build: .
    ports:
      - "3067:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-waterops}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - ./.env:/app/.env
    restart: unless-stopped
