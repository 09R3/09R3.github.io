<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Connection Modal ── -->
<div id="connect-overlay" class="overlay active">
  <div class="modal glass">
    <div class="modal-header">
      <div class="logo-icon">⬡</div>
      <h2>DB Viewer</h2>
      <p>Connect to a PostgreSQL database</p>
    </div>
    <form id="connect-form" autocomplete="on">
      <div class="form-row">
        <div class="field">
          <label>Host</label>
          <input type="text" id="db-host" value="localhost" required />
        </div>
        <div class="field field-sm">
          <label>Port</label>
          <input type="number" id="db-port" value="5432" required />
        </div>
      </div>
      <div class="field">
        <label>Database</label>
        <input type="text" id="db-name" required placeholder="my_database" />
      </div>
      <div class="form-row">
        <div class="field">
          <label>Username</label>
          <input type="text" id="db-user" required placeholder="postgres" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="db-pass" placeholder="(leave blank if none)" />
        </div>
      </div>
      <div id="connect-error" class="error-box hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="connect-btn">
        <span class="btn-text">Connect</span>
        <span class="btn-spinner hidden">Connecting…</span>
      </button>
    </form>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">⬡</span>
      <div class="sidebar-title">
        <span class="app-name">DB Viewer</span>
        <span id="db-label" class="db-label">—</span>
      </div>
      <button class="icon-btn" id="disconnect-btn" title="Disconnect">✕</button>
    </div>

    <div class="sidebar-search">
      <input type="text" id="table-search" placeholder="Search tables…" />
    </div>

    <nav class="table-list" id="table-list">
      <div class="loading-tables">Loading tables…</div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" id="sql-editor-btn">⌨ SQL Editor</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <h2 class="view-title" id="view-title">Select a table</h2>
        <span class="row-count" id="row-count"></span>
      </div>
      <div class="toolbar-right" id="toolbar-actions">
        <!-- populated dynamically -->
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar hidden" id="filter-bar">
      <input type="text" id="data-search" placeholder="Search rows…" />
      <select id="page-size">
        <option value="25">25 / page</option>
        <option value="50" selected>50 / page</option>
        <option value="100">100 / page</option>
        <option value="250">250 / page</option>
      </select>
      <div class="export-group">
        <span class="export-label">Export:</span>
        <button class="btn btn-ghost btn-sm export-btn" data-fmt="csv">CSV</button>
        <button class="btn btn-ghost btn-sm export-btn" data-fmt="xlsx">Excel</button>
        <button class="btn btn-ghost btn-sm export-btn" data-fmt="pdf">PDF</button>
      </div>
    </div>

    <!-- Data Grid -->
    <div class="grid-container" id="grid-container">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <p>Select a table from the sidebar<br>or open the SQL Editor</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination hidden" id="pagination">
      <button class="btn btn-ghost btn-sm" id="pg-first">«</button>
      <button class="btn btn-ghost btn-sm" id="pg-prev">‹</button>
      <span id="pg-info"></span>
      <button class="btn btn-ghost btn-sm" id="pg-next">›</button>
      <button class="btn btn-ghost btn-sm" id="pg-last">»</button>
    </div>

  </main>
</div>

<!-- ── SQL Editor Panel ── -->
<div class="sql-panel hidden" id="sql-panel">
  <div class="sql-panel-header">
    <h3>SQL Editor</h3>
    <div class="sql-actions">
      <div class="export-group">
        <span class="export-label">Export result:</span>
        <button class="btn btn-ghost btn-sm sql-export-btn" data-fmt="csv">CSV</button>
        <button class="btn btn-ghost btn-sm sql-export-btn" data-fmt="xlsx">Excel</button>
        <button class="btn btn-ghost btn-sm sql-export-btn" data-fmt="pdf">PDF</button>
      </div>
      <button class="btn btn-primary btn-sm" id="sql-run-btn">▶ Run</button>
      <button class="icon-btn" id="sql-close-btn">✕</button>
    </div>
  </div>
  <div class="sql-editor-wrap">
    <textarea id="sql-editor" spellcheck="false" placeholder="SELECT * FROM my_table LIMIT 100;"></textarea>
  </div>
  <div class="sql-result" id="sql-result">
    <div class="empty-state-sm">Run a query to see results</div>
  </div>
  <div class="sql-status" id="sql-status"></div>
</div>

<script src="app.js"></script>
</body>
</html>
